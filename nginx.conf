# =============================================================
# auth-cookie-refresh (slice 2) — production proxy
# =============================================================
# This file is the production equivalent of the dev proxy plugin
# in astro.config.mjs (`authCookieRefreshDevProxy`). Both implement
# the same path semantics:
#
#   /api/*  → strip /api prefix, forward to BACKEND_URL
#   /auth/* → forward verbatim to BACKEND_URL/auth/*
#   /*      → forward to the in-container Node SSR on :3000
#
# The browser hits ONE origin (this server). The HttpOnly refresh
# cookie is set on that origin and sent automatically on subsequent
# requests (SameSite=Strict works because everything is same-origin).
#
# Dev → prod equivalence:
#   dev  /api/auth/login     →  prod  /api/auth/login   (strip /api → /auth/login)
#   dev  /auth/login         →  prod  /auth/login       (verbatim → /auth/login)
#   dev  /api/products       →  prod  /api/products     (strip /api → /products)
#   dev  /dashboard          →  prod  /dashboard        (Node SSR)
# =============================================================

http {
    # gzip/log_format/etc would go here at the http level

server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy to backend NestJS
    # Rewrite: /api/auth/login -> /auth/login (backend doesn't use /api prefix)
    # BACKEND_URL se pasa por variable de entorno en docker-compose
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Explicit Cookie forwarding for the auth-cookie-refresh contract.
        # nginx does this by default, but being explicit documents the contract
        # and protects against future nginx default changes.
        proxy_set_header Cookie $http_cookie;
        # Disable proxy buffering for streaming responses (invoice PDFs, exports).
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Auth proxy to backend NestJS
    # Verbatim passthrough: /auth/login → BACKEND_URL/auth/login
    # The trailing slash on ${BACKEND_URL}/ tells nginx to pass the path
    # through after the location prefix. Without it, nginx would replace
    # the path entirely.
    location /auth/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Same explicit Cookie forwarding as /api/ — required for the
        # refresh-token rotation to work end-to-end.
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Everything else → Node SSR (Astro)
    # /assets in _astro/ are served as static by Astro's adapter when the
    # URL has a file extension, so the upstream pass-through is cheap.
    # We point directly to 127.0.0.1:3000 (no `upstream` block needed for
    # a single in-container Node process — upstream is for load-balanced
    # multi-instance setups, not relevant here).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Health check for load balancer
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

} # cierre de http